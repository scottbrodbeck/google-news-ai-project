name = "google-news-feed"
main = "src/worker/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ---- Live feed cron: rebuild the cached feed every 2 minutes ----
[triggers]
crons = ["*/2 * * * *"]

# ---- R2: stores the rendered live feed + (optionally) archive zips for download links ----
[[r2_buckets]]
binding = "FEED_BUCKET"
bucket_name = "google-news-feed"

# ---- Non-secret config (secrets go via `wrangler secret put`) ----
[vars]
# Static channel metadata
CHANNEL_TITLE = "Local News Now"
CHANNEL_DESCRIPTION = "Licensed news content from ARLnow, ALXnow and FFXnow."
# Rolling window for the live feed (days). 3 comfortably covers Google's "last 2 days".
WINDOW_DAYS = "3"
# How long a checked "Delete from Google Feed" record keeps emitting a tombstone (days).
TOMBSTONE_DAYS = "14"

# ---- Custom domain for the feed (optional but recommended) ----
# Uncomment after adding feeds.lnn.co to this Cloudflare account. Otherwise the
# worker is reachable at https://google-news-feed.<your-subdomain>.workers.dev
# [[routes]]
# pattern = "feeds.lnn.co/*"
# custom_domain = true

# ---- R2 lifecycle note ----
# Add a lifecycle rule on the bucket to expire `archive/` objects after ~30 days
# so old quarterly zips clean themselves up (download links are short-lived anyway).
