name: Quarterly archive

# Cloud archive job. Triggered by Zapier (Schedule -> repository_dispatch) so the
# schedule lives in Zapier and never auto-disables. Also runnable by hand from the
# Actions tab. Runs the same src/scripts/archive.ts the local `npm run archive` uses.
on:
  repository_dispatch:
    types: [archive]
  workflow_dispatch:
    inputs:
      quarter:
        description: "Quarter, e.g. 2026-Q2 (blank = last completed quarter)"
        required: false
        type: string
      sample:
        description: "Single ET day for Google QA, e.g. 2026-06-26 (overrides quarter)"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: quarterly-archive
  cancel-in-progress: false

jobs:
  archive:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Generate archive
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          # R2 upload (so the Worker's /archive/<FEED_SECRET>/… download link works)
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          PUBLIC_BASE_URL: ${{ secrets.PUBLIC_BASE_URL }}
          FEED_SECRET: ${{ secrets.FEED_SECRET }}
          # workflow_dispatch inputs OR repository_dispatch client_payload (from Zapier)
          SAMPLE: ${{ inputs.sample || github.event.client_payload.sample }}
          QUARTER: ${{ inputs.quarter || github.event.client_payload.quarter }}
        run: |
          ARGS=""
          [ -n "$SAMPLE" ] && ARGS="--sample $SAMPLE"
          [ -n "$QUARTER" ] && ARGS="$ARGS --quarter $QUARTER"
          echo "Running: npm run archive -- $ARGS"
          npm run archive -- $ARGS
      - name: Upload zip as a run artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: google-news-archive
          path: out/*.zip
          if-no-files-found: warn
          retention-days: 90
      - name: Notify Zapier (status + download link)
        if: always() # fires on success AND failure so Zapier always hears back
        env:
          ZAPIER_WEBHOOK_URL: ${{ secrets.ZAPIER_WEBHOOK_URL }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$ZAPIER_WEBHOOK_URL" ]; then echo "No ZAPIER_WEBHOOK_URL set — skipping callback"; exit 0; fi
          node --input-type=module -e '
            import fs from "node:fs";
            const result = fs.existsSync("out/result.json") ? JSON.parse(fs.readFileSync("out/result.json", "utf8")) : {};
            const body = { status: process.env.JOB_STATUS, run_url: process.env.RUN_URL, ...result };
            const r = await fetch(process.env.ZAPIER_WEBHOOK_URL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
            console.log("Zapier callback:", r.status, JSON.stringify(body));
            if (!r.ok) process.exit(1);
          '
